<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="medico.png">
    <title>Até o Último Homem</title>
</head>

<style>
    body{
        min-height:150vh;
    }

    ::-webkit-scrollbar {
        width: 12px;
    }

    ::-webkit-scrollbar-track {
        background: #2f3e2f; /* verde militar */
    }

    ::-webkit-scrollbar-thumb {
        background: #6b8e23; /* verde oliva */
        border-radius: 14px;
    }

    ::-webkit-scrollbar-thumb:hover {
        opacity: .95;
    }
</style>

<body>
    <div class="caixa-principal">
        <br>

        <h1>Até o Último Homem</h1>

        <br>

        <h2>Você conhece a história de Desmond Doss?</h2>
        <!-- Barra de progresso -->
<div class="barra-progresso">
    <div class="progresso"></div>
</div>

<!-- Pontuação -->
<p class="pontuacao"></p>

<!-- Som de clique -->
<audio id="somClique" src="click.mp3"></audio>

        <!-- Perguntas -->
        <div class="caixa-perguntas"></div>

        <!-- Alternativas -->
        <div class="caixa-alternativas"></div>

        <!-- Resultado -->
        <div class="caixa-resultado">
            <p class="texto-resultado"></p>
        </div>

        <br>

        <!-- Relógio -->
        <div class="relogio">
            <div>
                <span id="horas">00</span>
                <span class="tempo">Horas</span>
            </div>

            <div>
                <span id="minutos">00</span>
                <span class="tempo">Minutos</span>
            </div>

            <div>
                <span id="segundos">00</span>
                <span class="tempo">Segundos</span>
            </div>
        </div>

        <!-- Rodapé -->
        <section>
            <footer>

                <a href="https://github.com/Rafaela-alves" target="_blank">
                    <img src="github.png">
                    <p>Github</p>
                </a>

                <a href="https://www.youtube.com/" target="_blank">
                    <img src="youtube.png">
                    <p>YouTube</p>
                </a>

                <a href="https://api.whatsapp.com/send?phone=5543996247466" target="_blank">
                    <img src="Whatsapp.png">
                    <p>Whatsapp</p>
                </a>

                <a href="https://www.deepseek.com/">
                    <img src="deepseek-color.png">
                    <p>Deepseek</p>
                </a>

            </footer>
        </section>

    </div>

</body>

<script src="script.js"></script>
</html>
